#Troy Hinckley's dotfile for TMUX

# Hierarchy:
# #  Server
# #  ㄴSession
# #    ㄴWindow
# #      ㄴPane
#
# # Options:
# # - Session options (set-option [-g])
# # - Window options (set-window-option [-g])


set-option -g status-keys vi

set-option -s set-clipboard off # do not issue clipboard control sequence because Gnome terminal can't handle it. 

# Copy-mode
set-window-option -g mode-keys vi

bind-key -t vi-copy 'v' begin-selection

#Use bash or fish
# if-shell "test -f ~/local/bin/fish" "set-option -g default-shell ~/local/bin/fish" "set-option -g default-shell /usr/intel/bin/bash"
set-option -g default-shell /usr/intel/bin/bash

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on


set-window-option -g visual-bell on
set-window-option -g bell-action other

# don't rename windows automatically
set-option -g allow-rename off

# History
set-option -g history-limit 50000

set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'

# Bindings #
set-window-option -g xterm-keys off

# remap prefix from 'C-b' to 'C-f'
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# split panes using s and v
bind v split-window -h
bind s split-window -v
unbind '"'
unbind %

unbind -t vi-copy C-j

not_tmux='`echo "#{pane_current_command}" | grep -iqE "(^|\/)n?vim(diff)?$|emacs|^hh$|fzf"` || `echo "#{pane_start_command}" | grep -iqE "fzf"`'

bind-key -n C-h if-shell "$not_tmux" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$not_tmux" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$not_tmux" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$not_tmux" "send-keys C-l" "select-pane -R"

bind-key tab select-pane -t :.+
bind-key btab select-pane -t :.-

bind-key a run-shell "if [ `tmux show-options -v mouse` == on ]; then tmux set mouse off; if ! tmux list-panes -F '#F' | grep -q Z ; then tmux resize-pane -Z; fi ; else tmux set mouse on; fi"

######################
### DESIGN CHANGES ###
######################

# panes
set -g pane-border-fg black
set -g pane-active-border-fg brightred

## Status bar design
# status line
set -g status-justify left
set -g status-bg colour10
set -g status-fg colour12
set -g status-interval 2

# messaging
set -g message-fg black
set -g message-bg yellow
set -g message-command-fg blue
set -g message-command-bg black

#window mode
setw -g mode-bg colour6
setw -g mode-fg colour0

# window status
setw -g window-status-format " #F#I:#W#F "
setw -g window-status-current-format " #F#I:#W#F "
setw -g window-status-format "#[fg=magenta]#[bg=black] #I #[bg=cyan]#[fg=colour8] #W "
setw -g window-status-current-format "#[bg=colour226]#[fg=colour8] #I #[fg=colour8]#[bg=colour14] #W "
setw -g window-status-current-bg colour0
setw -g window-status-current-fg colour11
setw -g window-status-current-attr dim
setw -g window-status-bg green
setw -g window-status-fg black
setw -g window-status-attr reverse

# Info on left (I don't have a session display for now)
set -g status-left ''

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

set -g default-terminal "screen-256color"

# The modes {
setw -g clock-mode-colour colour135
setw -g mode-attr bold
setw -g mode-fg colour196
setw -g mode-bg colour238

# }
# The panes {

set -g pane-border-bg colour235
set -g pane-border-fg colour238
set -g pane-active-border-bg colour236
set -g pane-active-border-fg colour51

# }
# The statusbar {

set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-attr dim
set -g status-left "       "
set -g status-right '#{prefix_highlight} #[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M '
set -g status-right-length 50
set -g status-left-length 10

setw -g window-status-current-fg colour81
setw -g window-status-current-bg colour238
setw -g window-status-current-attr bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-fg colour138
setw -g window-status-bg colour235
setw -g window-status-attr none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-attr bold
setw -g window-status-bell-fg colour255
setw -g window-status-bell-bg colour1

# }
# The messages {

set -g message-attr bold
set -g message-fg colour232
set -g message-bg colour166
# }

run-shell ~/.tmux/tmux-copycat/copycat.tmux
run-shell ~/.tmux/tmux-yank/yank.tmux
run-shell ~/.tmux/tmux-prefix-highlight/prefix_highlight.tmux
run-shell ~/.tmux/tmux-better-mouse-mode/scroll_copy_mode.tmux

